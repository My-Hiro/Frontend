<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9f1ff" />
      <stop offset="0.55" stop-color="#fff3e6" />
      <stop offset="1" stop-color="#eafff5" />
    </linearGradient>
    <linearGradient id="shelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a" stop-opacity="0.22" />
      <stop offset="1" stop-color="#0f172a" stop-opacity="0.06" />
    </linearGradient>
    <filter id="soft" x="-20" y="-20" width="440" height="440" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="8" />
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)" />

  <!-- Soft "shelves" so the placeholder reads like a real photo tile -->
  <g filter="url(#soft)" opacity="0.9">
    <rect x="44" y="78" width="312" height="72" rx="16" fill="url(#shelf)" />
    <rect x="44" y="168" width="312" height="72" rx="16" fill="url(#shelf)" />
    <rect x="44" y="258" width="312" height="72" rx="16" fill="url(#shelf)" />
  </g>

  <!-- Product-like blocks (subtle; keeps it "photo-like" without being an icon) -->
  <g opacity="0.92">
    <rect x="68" y="92" width="58" height="44" rx="10" fill="#ffffff" fill-opacity="0.70" />
    <rect x="136" y="92" width="78" height="44" rx="10" fill="#ffffff" fill-opacity="0.55" />
    <rect x="224" y="92" width="46" height="44" rx="10" fill="#ffffff" fill-opacity="0.62" />
    <rect x="280" y="92" width="52" height="44" rx="10" fill="#ffffff" fill-opacity="0.48" />

    <rect x="78" y="182" width="44" height="44" rx="10" fill="#ffffff" fill-opacity="0.58" />
    <rect x="132" y="182" width="96" height="44" rx="10" fill="#ffffff" fill-opacity="0.66" />
    <rect x="238" y="182" width="54" height="44" rx="10" fill="#ffffff" fill-opacity="0.52" />
    <rect x="302" y="182" width="40" height="44" rx="10" fill="#ffffff" fill-opacity="0.60" />

    <rect x="72" y="272" width="64" height="44" rx="10" fill="#ffffff" fill-opacity="0.54" />
    <rect x="146" y="272" width="52" height="44" rx="10" fill="#ffffff" fill-opacity="0.64" />
    <rect x="208" y="272" width="86" height="44" rx="10" fill="#ffffff" fill-opacity="0.56" />
    <rect x="304" y="272" width="38" height="44" rx="10" fill="#ffffff" fill-opacity="0.68" />
  </g>

  <!-- Gentle vignette for depth -->
  <rect width="400" height="400" fill="#0f172a" opacity="0.05" />
</svg>
